async function startVideo() {
  if (!roomId) {
    alert("Room ID missing");
    return;
  }

  socket = io("https://icu-virtual-visit.onrender.com", {
    transports: ["websocket", "polling"]
  });

  // ✅ EVENTS YAHAN ADD KARO
  socket.on('user-joined', async () => {
    if (!peerConnection) return;

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit('offer', { roomId, offer });
  });

  // socket.on('offer', async offer => {
  //   if (!peerConnection) return;

  //   await peerConnection.setRemoteDescription(offer);

  //   const answer = await peerConnection.createAnswer();
  //   await peerConnection.setLocalDescription(answer);

  //   socket.emit('answer', { roomId, answer });
  // });

  socket.on('offer', async offer => {
  if (!peerConnection) return;

  // ✅ ADD THIS LINE
  if (peerConnection.signalingState !== "stable") return;

  // ✅ CHANGE THIS
  await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);

  socket.emit('answer', { roomId, answer });
});

  // socket.on('answer', async answer => {
  //   if (!peerConnection) return;

  //   await peerConnection.setRemoteDescription(answer);
  // });

  socket.on('answer', async answer => {
  if (!peerConnection) return;

  try {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
  } catch (e) {
    console.log("Answer error:", e);
  }
});

  // socket.on('ice-candidate', async candidate => {
  //   if (!peerConnection) return;

  //   await peerConnection.addIceCandidate(candidate);
  // });



  socket.on('ice-candidate', async candidate => {
  if (!peerConnection) return;

  try {
    await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
  } catch (e) {
    console.log("ICE error:", e);
  }
});

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    localVideo.srcObject = localStream;

    peerConnection = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });

    peerConnection.ontrack = event => {
      remoteVideo.srcObject = event.streams[0];

      // ✅ TIMER YAHAN START
      startCallTimer();
    };

    peerConnection.onicecandidate = event => {
      if (event.candidate) {
        socket.emit('ice-candidate', {
          roomId,
          candidate: event.candidate
        });
      }
    };

    socket.emit('join-room', roomId);

  } catch (error) {
    console.error(error);
  }
}

let timeLeft=300;
let timerStarted = false;

function startCallTimer() {
  if (timerStarted) return;
  timerStarted = true;

  const timer = setInterval(async () => {
    timeLeft--;
    timerEl.innerText = `Time Left: ${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);

      const endTime = new Date();

      await fetch('https://icu-virtual-visit.onrender.com/api/session/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          roomId,
          startTime,
          endTime,
          duration: 300
        })
      });

      
      // const time = localStorage.getItem("callTime") || 300;

window.location.href = `feedback.html?room=${roomId}`;
    }
  }, 1000);
}
