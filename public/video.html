<body class="video-page">
   <a href="home.html" class="top-home-btn">🏠 Home</a>
  <h1 id="v2"><b>ICU Virtual Visit</b></h1>
  <h2 id="timer">Time Left: 300s</h2>

  <div class="video-wrapper">
    <video id="localVideo" autoplay muted playsinline></video>
    <video id="remoteVideo" autoplay playsinline></video>
  </div>

 <!-- // <script src="/socket.io/socket.io.js"></script> -->
 <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
   // const socket = io();
   const socket = io("https://icu-virtual-visit.onrender.com", {
  transports: ["websocket", "polling"]
});
    // const roomId = window.location.search.substring(1);
const roomId = new URLSearchParams(window.location.search).get("room");

// if (roomId) {
//   socket.emit("join-room", roomId);
// }
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const timerEl = document.getElementById('timer');

    let peerConnection;
    let localStream;
    let startTime = new Date();

    const config = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' }
      ]
    };

    async function startVideo() {
      if (!roomId) {
  alert("Room ID missing");
  return;
}
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        //local camera attach
        localVideo.srcObject = localStream;

        peerConnection = new RTCPeerConnection(config);

        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });

        //remote stream attach
        peerConnection.ontrack = event => {
          remoteVideo.srcObject = event.streams[0];
          startCallTimer();
        };

        peerConnection.onicecandidate = event => {
          if (event.candidate) {
            socket.emit('ice-candidate', {
              roomId,
              candidate: event.candidate
            });
          }
        };

        socket.emit('join-room', roomId);

      } catch (error) {
        alert('Camera access denied or not found');
        console.error(error);
      }
    }

    socket.on('user-joined', async () => {
      if(!peerConnection)return;
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      socket.emit('offer', { roomId, offer });
    });

    socket.on('offer', async offer => {
      if (!peerConnection)return;
      if(peerConnection.signalingState !=="stable")return;
      await peerConnection.setRemoteDescription(offer);

      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);

      socket.emit('answer', { roomId, answer });
    });

    socket.on('answer', async answer => {
      if(!peerConnection) return;
      await peerConnection.setRemoteDescription(answer);
    });

    socket.on('ice-candidate', async candidate => {
      if(!peerConnection)return ;
      try {
        await peerConnection.addIceCandidate(candidate);
      } catch (err) {
        console.error(err);
      }
    });

    // TIMER
    // let timeLeft = 300;
    // const timer = setInterval(async () => {
    //   timeLeft--;
    //   timerEl.innerText = `Time Left: ${timeLeft}s`;

    //   if (timeLeft <= 0) {
    //     clearInterval(timer);

    //     const endTime = new Date();

    //    await fetch('https://icu-virtual-visit.onrender.com/api/session/log', {
    //       method: 'POST',
    //       headers: {
    //         'Content-Type': 'application/json'
    //       },
    //       body: JSON.stringify({
    //         roomId,
    //         startTime,
    //         endTime,
    //         duration: 300
    //       })
    //     });

    //     window.location.href = `feedback.html?room=${roomId}`;
    //   }
    // }, 1000);
    let timeLeft = 300;
let timerStarted = false;

function startCallTimer() {
  if (timerStarted) return;
  timerStarted = true;

  const timer = setInterval(async () => {
    timeLeft--;
    timerEl.innerText = `Time Left: ${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);

      const endTime = new Date();

      await fetch('https://icu-virtual-visit.onrender.com/api/session/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          roomId,
          startTime,
          endTime,
          duration: 300
        })
      });

      window.location.href = `feedback.html?room=${roomId}`;
    }
  }, 1000);
}

    startVideo();
  </script>
</body>
